      destroy-max: 100
      success-min: 20
      success-max: 100
    book-item:
      material: BOOK
      display-name: "{group_color}{enchant} {level}"
      lore:
        - "&a{success_rate}% Success Rate"
        - "&c{destroy_rate}% Destroy Rate"
        - "{description}"
        - "&7{item_group} Enchantment"
        - "&7Drag and drop to enchant."